{% extends "base.html" %}
{% block title %}FAMA - Registro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-1">
                    <i class="bi bi-person-plus me-2 text-primary"></i>Solicitar acceso
                </h3>
                <p class="text-center text-muted small mb-4">
                    Tras la aprobación del administrador recibirás tus credenciales de acceso.
                </p>

                <form method="POST" action="{{ url_for('auth.registro') }}">

                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required autofocus>
                    </div>

                    <div class="mb-4">
                        <label for="email" class="form-label">Email</label>
                        <input type="text" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-send me-1"></i>Solicitar acceso
                        </button>
                    </div>
                </form>

                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Ya tienes cuenta? Inicia sesion</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
