{% extends "base.html" %}
{% block title %}FAMA - Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-box-arrow-in-right me-2 text-primary"></i>Iniciar Sesión
                </h3>
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre de usuario</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
                        </button>
                    </div>
                </form>
                <div class="text-center">
                    <a href="{{ url_for('auth.registro') }}" class="text-decoration-none">¿No tienes cuenta? Regístrate</a>
                    <br>
                    <a href="{{ url_for('auth.recuperar_password') }}" class="text-decoration-none text-muted small">
                        ¿Olvidaste tu contraseña?
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
