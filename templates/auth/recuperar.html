{% extends "base.html" %}
{% block title %}FAMA - Recuperar Contrasenia{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-unlock me-2 text-info"></i>Recuperar Contrasenia
                </h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Email de tu cuenta</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Respuesta a tu pregunta de seguridad</label>
                        <input type="text" class="form-control" name="respuesta_seguridad" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nueva contrasenia</label>
                        <input type="password" class="form-control" name="nueva_password" required minlength="6">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmar nueva contrasenia</label>
                        <input type="password" class="form-control" name="confirmar_password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-info text-white">
                            <i class="bi bi-arrow-counterclockwise me-1"></i>Recuperar cuenta
                        </button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none">Volver al login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
