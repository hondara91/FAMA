{% extends "base.html" %}
{% block title %}FAMA - Mi Perfil{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-person-circle me-2 text-primary"></i>Mi perfil
                </h3>

                <div class="text-center mb-4">
                    {% if usuario.foto_perfil %}
                    <img class="fama-avatar fama-avatar-xl"
                         src="{{ url_for('static', filename='uploads/perfiles/' + usuario.foto_perfil) }}"
                         alt="Foto de {{ usuario.nombre }}">
                    {% else %}
                    <div class="fama-avatar fama-avatar-xl fama-avatar-placeholder mx-auto">
                        <i class="bi bi-person-fill"></i>
                    </div>
                    {% endif %}
                    <h5 class="mt-3 mb-0">{{ usuario.nombre }}</h5>
                    <p class="text-muted small mb-0">{{ usuario.email }}</p>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label">Foto de perfil</label>
                        <input class="form-control" type="file" name="foto_perfil" accept="image/*" required>
                        <div class="form-text">PNG, JPG, JPEG, GIF o WEBP. Max 5 MB.</div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-fill">
                            <i class="bi bi-upload me-1"></i>Actualizar foto
                        </button>
                        {% if usuario.foto_perfil %}
                        <button type="submit" name="borrar_foto" value="1" class="btn btn-outline-danger"
                                formnovalidate>
                            <i class="bi bi-trash"></i>
                        </button>
                        {% endif %}
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
