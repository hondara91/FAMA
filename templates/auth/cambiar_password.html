{% extends "base.html" %}
{% block title %}FAMA - Cambiar Contraseña{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-key me-2 text-warning"></i>Cambiar Contraseña
                </h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Contraseña actual</label>
                        <input type="password" class="form-control" name="password_actual" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nueva contraseña</label>
                        <div class="input-group">
                            <input type="password" class="form-control" name="nueva_password" id="nueva_password"
                                   required minlength="8" data-pwd-indicator="icn-cambiar-pwd">
                            <span class="input-group-text px-2" id="icn-cambiar-pwd" style="cursor:help">
                                <i class="bi bi-exclamation-circle text-warning"></i>
                            </span>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmar nueva contraseña</label>
                        <input type="password" class="form-control" name="confirmar_password" required minlength="8">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-shield-check me-1"></i>Cambiar contraseña
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
