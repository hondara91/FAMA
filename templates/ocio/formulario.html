{% extends "base.html" %}
{% block title %}FAMA - {{ accion }} Evento{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <h3 class="mb-4"><i class="bi bi-calendar-event text-info me-2"></i>{{ accion }} evento</h3>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Tipo de evento *</label>
                            <select class="form-select" name="tipo_evento" required>
                                <option value="">Selecciona...</option>
                                {% for t in ['Deporte', 'Cultural', 'Otros'] %}
                                <option value="{{ t }}" {% if evento and evento.tipo_evento==t %}selected{% endif %}>{{ t }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Aforo máximo *</label>
                            <input type="number" class="form-control" name="aforo_maximo" min="1" required
                                   value="{{ evento.aforo_maximo if evento else '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Título del evento *</label>
                            <input type="text" class="form-control" name="titulo" required
                                   value="{{ evento.titulo if evento else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Fecha *</label>
                            <input type="date" class="form-control" name="fecha" required
                                   min="{{ now.strftime('%Y-%m-%d') }}"
                                   value="{{ evento.fecha if evento else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Hora *</label>
                            <input type="time" class="form-control" name="hora" required
                                   value="{{ evento.hora if evento else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Lugar *</label>
                            <input type="text" class="form-control" name="lugar" required
                                   value="{{ evento.lugar if evento else '' }}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" name="descripcion" rows="4">{{ evento.descripcion if evento else '' }}</textarea>
                        </div>
                    </div>
                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-info text-white">
                            <i class="bi bi-check-lg me-1"></i>{{ accion }} evento
                        </button>
                        <a href="{{ url_for('ocio.listar') }}" onclick="history.back(); return false;"
                           class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
